<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Tester links for Beautiful Apps alpha builds." />
    <title>Beautiful Applesauce Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body class="links-page">
    <div class="page-shell links-shell">
      <header class="site-header compact">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">
            <img src="../assets/hero-mark.svg" alt="" />
          </span>
          <span class="brand-copy">
            <span class="brand-name">Beautiful Applesauce</span>
            <span class="brand-subtitle">Tester access</span>
          </span>
        </a>
        <span class="header-link muted">Unlisted page</span>
      </header>

      <main class="links-main">
        <section class="links-intro">
          <h1>Tester links</h1>
          <p>
            This page stays out of the main navigation. Share it directly with testers when you want to hand out alpha builds.
          </p>
        </section>

        <section class="link-list">
          <article class="link-card">
            <div>
              <h2>Count This</h2>
              <p>Alpha test access for the first Beautiful Apps release.</p>
            </div>
            <a
              class="link-button"
              href="https://play.google.com/apps/internaltest/4701193251673856448"
              target="_blank"
              rel="noreferrer"
            >
              Open tester link
            </a>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
